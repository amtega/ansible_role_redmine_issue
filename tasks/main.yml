---
# Role tasks
- block:

    - name: Ensure if redmine issue is already created
      uri:
        url: >-
         {{ redmine_issue_server_url
            + "/projects/"
            + redmine_issue_project_name
            + "/issues.json?parent_id="
            ~ redmine_isssue_create_request.issue.parent_issue_id
            + "&description=~"
            + inventory_hostname }}
        method: GET
        validate_certs: "{{ redmine_issue_validate_certs }}"
        headers:
          X-Redmine-API-Key: "{{ redmine_issue_api_password }}"
        return_content: yes
        timeout: 90
      register: redmine_issue_get_issue_result

    - name: Create json file with request data
      template:
        src: issue_request.j2
        dest: "{{ redmine_issue_json_request_file }}"
      when: redmine_issue_get_issue_result.json.total_count == 0

    - name: Add issue to a redmine project via rest api
      uri:
        url: >-
         {{ redmine_issue_server_url
            + "/projects/"
            + redmine_issue_project_name
            + "/issues.json"}}
        method: POST
        validate_certs: "{{ redmine_issue_validate_certs }}"
        src: "{{ redmine_issue_json_request_file}}"
        remote_src: 'yes'
        headers:
          X-Redmine-API-Key: "{{ redmine_issue_api_password }}"
          Content-Type: application/json
        return_content: yes
        timeout: 90
      when: redmine_issue_get_issue_result.json.total_count == 0
      register: redmine_issue_add_issue_result
      changed_when: redmine_issue_add_issue_result.status == 201
      failed_when: redmine_issue_add_issue_result.status != 201

  tags:
    - role::redmine_issue
