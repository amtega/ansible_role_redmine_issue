---
# Role default lower priority variables

# Fill whith url and auth info to access the redmine api
redmine_issue_server_url: "https://redmine-example.domain.com/example"
redmine_issue_project_name: "example-project"
redmine_issue_api_password: f30203a9be7e35216ea2121c798d3062da973ffb

# Ignore de certs validation if needed
redmine_issue_validate_certs: "no"

# Path to json request file
redmine_issue_json_request_file: /tmp/request.json

# Dict with request parameters needed to create a issue.
# The parameters can be required or optional depends your redmine configuration.
# A list of parametres
#   project_id
#   tracker_id
#   status_id
#   priority_id
#   subject
#   description
#   category_id
#   fixed_version_id - ID of the Target Versions (previously called 'Fixed Version' and still referred to as such in the API)
#   assigned_to_id - ID of the user to assign the issue to (currently no mechanism to assign by name)
#   parent_issue_id - ID of the parent issue
#   custom_fields
#   watcher_user_ids - Array of user ids to add as watchers (since 2.3.0)
#   is_private - Use true or false to indicate whether the issue is private or not
#   estimated_hours - Number of hours estimated for issue
#
# You can read https://www.redmine.org/projects/redmine/wiki/Rest_Issues for further information

redmine_isssue_create_request:
    subject: "[Ansible] Example subject"
    description: "Example description"
